# BlockDAG local devnet node configuration.

listen=0.0.0.0
port=18150

rpclisten=0.0.0.0:38131

evm.http.addr=0.0.0.0
evm.http.port=18545
evm.ws.addr=0.0.0.0
evm.ws.port=18546

maxpeers=8
cache=512
cache.database=50

rpcuser=test
rpcpass=test

datadir=/var/lib/bdagStack/node
logdir=/var/log/bdagStack

metrics=true
profile=0.0.0.0:6060

modules=Blockdag
modules=miner

evm.http.api=eth,net,web3,txpool,debug
http.readtimeout=45s
http.writetimeout=45s
http.idletimeout=45s
evmenv="--rpc.allow-unprotected-txs --metrics --metrics.addr 0.0.0.0 --metrics.port 6060 --cache 512"
rpcmaxclients=64
rpcmaxclientsperhost=16
rpcmaxconcurrentreqs=500
rpcrequesttimeout=60s
http.ratelimit=0
