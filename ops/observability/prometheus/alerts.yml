groups:
  - name: bdag-mining-critical
    rules:
      - alert: BDAGPoolValidShareStall
        expr: bdag_pool_share_stall == 1 or bdag_pool_last_valid_share_age_seconds > 300
        for: 2m
        labels:
          severity: critical
          component: pool
        annotations:
          summary: "BlockDAG pool has stopped accepting fresh valid shares"
          description: "Last valid share age is {{ $value }} seconds. Use the old dashboard repair console if this persists."

      - alert: BDAGMinerDown
        expr: bdag_miner_up == 0
        for: 2m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.miner }} is down"
          description: "{{ $labels.miner }} at {{ $labels.ip }} is not OK for more than 2 minutes."

      - alert: BDAGStratumEndpointDown
        expr: probe_success{job="pool-stratum-tcp"} == 0
        for: 1m
        labels:
          severity: critical
          component: stratum
        annotations:
          summary: "Pool stratum endpoint is not reachable"
          description: "{{ $labels.instance }} failed TCP probe."

      - alert: BDAGDashboardAPIUnavailable
        expr: bdag_dashboard_api_up == 0 or probe_success{job="old-dashboard-http"} == 0
        for: 2m
        labels:
          severity: critical
          component: dashboard
        annotations:
          summary: "Old dashboard API is unavailable"
          description: "The observability stack depends on the old dashboard API for BlockDAG-specific metrics."

      - alert: BDAGEarningsSamplerStale
        expr: bdag_earnings_sampler_stale == 1 or bdag_earnings_sampler_latest_age_seconds > bdag_earnings_sampler_stale_threshold_seconds or bdag_earnings_history_stale == 1 or bdag_earnings_history_latest_age_seconds > bdag_earnings_history_stale_threshold_seconds
        for: 2m
        labels:
          severity: warning
          component: watchdog
        annotations:
          summary: "Earnings/miner plot sampler is stale"
          description: "The latest valid plot snapshot is stale. Check bdag-watchdog.service and bdag-watchdog-guard.timer."

      - alert: BDAGNodeTemplateErrors
        expr: bdag_node_template_errors_recent{health_scope="production"} > 0
        for: 2m
        labels:
          severity: critical
          component: node
        annotations:
          summary: "Node {{ $labels.node }} has recent mining template errors"
          description: "Template errors can degrade ASIC work allocation. Existing watchdog may perform targeted recovery."

      - alert: BDAGActiveRPCPrimaryTemplateFailure
        expr: bdag_rpc_node_primary == 1 and bdag_rpc_node_template_failing == 1
        for: 1m
        labels:
          severity: critical
          component: rpc-router
        annotations:
          summary: "Active RPC primary has template failures"
          description: "{{ $labels.node }} is the current RPC primary and is failing mining-template health checks."

      - alert: BDAGRPCSwitchRecommended
        expr: bdag_rpc_router_should_switch == 1
        for: 1m
        labels:
          severity: critical
          component: rpc-router
        annotations:
          summary: "RPC router recommends a primary switch"
          description: "The external app-aware router sees a healthier backend node than the current primary."

      - alert: BDAGRPCPrimarySuboptimal
        expr: bdag_rpc_router_current_suboptimal == 1
        for: 2m
        labels:
          severity: critical
          component: rpc-router
        annotations:
          summary: "Current RPC primary is suboptimal"
          description: "The app-aware router sees degraded primary quality before or during a performance loss."

      - alert: BDAGP2PGuardUnavailable
        expr: bdag_p2p_guard_up == 0
        for: 5m
        labels:
          severity: critical
          component: p2p-guard
        annotations:
          summary: "P2P guard is unavailable"
          description: "P2P/network health state is not being exported, so pre-drop network detection is blind."

      - alert: BDAGP2PActivePrimaryDegraded
        expr: bdag_p2p_node_active_primary{health_scope="production"} == 1 and bdag_p2p_node_score{health_scope="production"} < 80
        for: 2m
        labels:
          severity: critical
          component: p2p
        annotations:
          summary: "Active RPC primary P2P score is degraded"
          description: "{{ $labels.node }} is active primary with P2P score {{ $value }}."

      - alert: BDAGP2PNodeDegraded
        expr: bdag_p2p_node_score{health_scope="production"} < 80
        for: 5m
        labels:
          severity: warning
          component: p2p
        annotations:
          summary: "Node {{ $labels.node }} P2P score is degraded"
          description: "A degraded standby node reduces failover quality even if mining is still routed to the healthy primary."

  - name: bdag-mining-warning
    rules:
      - alert: BDAGMinerNotConfigured
        expr: bdag_miner_configured == 0
        for: 2m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.miner }} is not configured for expected pool"
          description: "Use the old dashboard miner configuration control if this persists."

      - alert: BDAGMinerLowWorkShare
        expr: bdag_miner_work_percent < 5 and bdag_miner_connected == 1
        for: 10m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.miner }} has low work share"
          description: "{{ $labels.miner }} has work share below 5% while connected."

      - alert: BDAGNodeSyncDrift
        expr: bdag_node_block_lag > 5 or bdag_sync_remaining_blocks > 5
        for: 3m
        labels:
          severity: warning
          component: node
        annotations:
          summary: "BlockDAG node sync drift detected"
          description: "Node lag or remaining sync blocks exceeded expected threshold."

      - alert: BDAGNodeImportStale
        expr: bdag_node_last_import_age_seconds{health_scope="production"} > 180
        for: 3m
        labels:
          severity: warning
          component: node
        annotations:
          summary: "Node {{ $labels.node }} import stream is stale"
          description: "Node has not logged a recent import for {{ $value }} seconds."

      - alert: BDAGPoolJobNotifyStall
        expr: bdag_pool_job_stall == 1 or bdag_pool_last_job_notify_age_seconds > 180
        for: 2m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Pool job notifications appear stalled"
          description: "ASICs may stop receiving fresh work if this continues."

      - alert: BDAGBlockSubmitErrors
        expr: bdag_pool_block_submit_error_recent > 0
        for: 1m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Recent block submit errors"
          description: "The pool log window contains failed block submissions."

      - alert: BDAGBlockSubmitErrorStorm
        expr: bdag_pool_block_submit_error_storm == 1
        for: 1m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Block submit error storm"
          description: "The pool is seeing a high error-to-success ratio for block submissions."

      - alert: BDAGAcceptedJobExpiredStorm
        expr: bdag_pool_accepted_job_expired_storm == 1
        for: 1m
        labels:
          severity: critical
          component: pool
        annotations:
          summary: "Pool acceptedJobs expired storm"
          description: "ASICs are connected but the pool is rejecting work for expired acceptedJobs. The watchdog should restart only asic-pool if this persists."

      - alert: BDAGPoolQualityPressure
        expr: bdag_rpc_router_pool_quality_pressure == 1
        for: 2m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Pool quality is degrading before a hard stall"
          description: "Router quality ratios show elevated submit errors, stale-job candidates, overdue submits, or low accepted-share ratio."

      - alert: BDAGPrimaryP2PResets
        expr: bdag_rpc_node_primary == 1 and bdag_rpc_node_p2p_stream_errors >= 10
        for: 1m
        labels:
          severity: warning
          component: node
        annotations:
          summary: "Active RPC primary has P2P stream resets"
          description: "Recent P2P resets on the active primary can reduce template freshness and useful accepted work."

      - alert: BDAGP2PPeerCountLow
        expr: bdag_p2p_node_native_peer_count{health_scope="production"} < 4
        for: 5m
        labels:
          severity: warning
          component: p2p
        annotations:
          summary: "Node {{ $labels.node }} has low P2P peer count"
          description: "Native peer count is below the configured guard floor."

      - alert: BDAGMiningDefaultRouteChanged
        expr: bdag_network_default_route_ok == 0
        for: 1m
        labels:
          severity: warning
          component: network
        annotations:
          summary: "Mining host default route is not on the wired interface"
          description: "Mining traffic should stay on Ethernet; Wi-Fi or ZeroTier as default can add latency."

      - alert: BDAGMiningGatewayLatencyHigh
        expr: bdag_network_gateway_rtt_ms > 20 or bdag_network_gateway_ping_up == 0
        for: 2m
        labels:
          severity: warning
          component: network
        annotations:
          summary: "Mining gateway latency or loss detected"
          description: "Gateway ping is slow or failing, which can affect P2P and ASIC/pool traffic."

      - alert: BDAGStaleJobCandidateStorm
        expr: bdag_pool_stale_job_candidate_storm == 1
        for: 1m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Stale-job candidate storm"
          description: "ASICs are finding too many candidates on stale jobs, which points to template freshness problems."

      - alert: BDAGDuplicateBlockSpike
        expr: bdag_pool_duplicate_blocks_recent > 5
        for: 2m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Duplicate block submissions increased"
          description: "Duplicate block submissions indicate wasted submit work or stale template racing."

      - alert: BDAGStaleSubmitIncrease
        expr: bdag_pool_stale_submits_recent > 0
        for: 3m
        labels:
          severity: warning
          component: pool
        annotations:
          summary: "Recent stale submit activity"
          description: "The pool log window contains stale submits. Check pool/node sync and template freshness."

      - alert: BDAGHighCPUTemperature
        expr: node_thermal_zone_temp > 85
        for: 5m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "CPU temperature is high"
          description: "Thermal sensor {{ $labels.zone }} reports {{ $value }}C."

      - alert: BDAGDiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} < 0.15
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Root filesystem free space below 15%"
          description: "Low disk space can degrade node/database performance."

      - alert: BDAGContainerRestarted
        expr: increase(container_start_time_seconds{name=~"asic-pool|bdag-miner-node-[0-9]+|pool-db|rpc-failover"}[10m]) > 0
        for: 0m
        labels:
          severity: warning
          component: docker
        annotations:
          summary: "Mining container restarted"
          description: "Container {{ $labels.name }} appears to have restarted in the last 10 minutes."

      - alert: BDAGPostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "Pool DB monitoring is unavailable."

      - alert: BDAGLokiIngestionUnavailable
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: warning
          component: logs
        annotations:
          summary: "Loki metrics endpoint is unavailable"
          description: "Log ingestion or Loki monitoring is unavailable."
