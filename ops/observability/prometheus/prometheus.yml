global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    site: bdag-local
    stack: mining

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: bdag-exporter
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - bdag-exporter:9108
        labels:
          service: bdag-exporter

  - job_name: old-dashboard-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8088/api/status
        labels:
          service: old-dashboard
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: pool-stratum-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - host.docker.internal:3334
        labels:
          service: asic-pool
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: asic-pool-native
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets:
          - 172.18.0.6:9090
        labels:
          service: asic-pool

  - job_name: node-exporter
    scrape_interval: 30s
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: host

  - job_name: cadvisor
    scrape_interval: 60s
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: docker

  - job_name: postgres-exporter
    scrape_interval: 60s
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: pool-db

  - job_name: bdag-native-node
    scrape_interval: 30s
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets:
          - host.docker.internal:6061
        labels:
          service: bdag-miner-node
          node: bdag-miner-node-1
      - targets:
          - host.docker.internal:6062
        labels:
          service: bdag-miner-node
          node: bdag-miner-node-2

  - job_name: loki
    scrape_interval: 60s
    static_configs:
      - targets:
          - loki:3100
        labels:
          service: loki

  - job_name: alertmanager
    scrape_interval: 60s
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
