modules:
  dashboard_status:
    metrics:
      - name: bdag_json_sync_progress_percent
        path: "{ .sync_progress.percent }"
        help: "Dashboard sync progress percentage via json_exporter. Prefer bdag_exporter for normalized labels and failure metrics."
        labels:
          source: "status"
        type: value
      - name: bdag_json_connected_miner_count
        path: "{ .miner_health.connected_count }"
        help: "Connected miner count via json_exporter. Prefer bdag_exporter for per-miner metrics."
        labels:
          source: "status"
        type: value
  dashboard_global:
    metrics:
      - name: bdag_json_global_latest_block
        path: "{ .latest_block }"
        help: "Latest block from the old dashboard global API via json_exporter."
        labels:
          source: "global"
        type: value
  dashboard_earnings:
    metrics:
      - name: bdag_json_wallet_balance_bdag
        path: "{ .credit_balance_check.wallet_bdag }"
        help: "Wallet BDAG balance from old dashboard earnings API via json_exporter."
        labels:
          source: "earnings"
        type: value
