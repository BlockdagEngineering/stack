apiVersion: 1

datasources:
  - name: Prometheus
    uid: bdag-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s

  - name: Loki
    uid: bdag-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
