global:
  resolve_timeout: 5m

route:
  receiver: local-log
  group_by: ["alertname", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: local-log

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["component"]
