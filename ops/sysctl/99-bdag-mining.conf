# Keep desktop autogrouping from weakening explicit service/container priority.
kernel.sched_autogroup_enabled = 0

# Avoid swapping mining services while this host has ample RAM.
vm.swappiness = 10

# Prefer retaining hot inode/dentry/cache state for chain databases. This works
# with the node process cache instead of fighting it, and lowers USB/SD reads.
vm.vfs_cache_pressure = 50

# Bound dirty writeback with byte caps so slow flash cannot collect a large
# ratio-based write burst that later stalls block import or share submission.
vm.dirty_background_bytes = 67108864
vm.dirty_bytes = 268435456
