# Overrides merged with image defaults. Bind-mounted files/sockets are not directories;
# without this, diskspace logs: "is not a directory" for group/passwd/docker.sock.
[plugin:proc:diskspace]
    exclude space metrics on paths = /host/etc/passwd /host/etc/group /var/run/docker.sock /run/docker.sock /host/sys/kernel/debug/tracing
