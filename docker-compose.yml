
x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-./latest.bdsnap}

services:

  # --------------------------------------------------------------------------
  # PostgreSQL for the mining pool. Schema is applied automatically on first
  # boot via /docker-entrypoint-initdb.d.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-bdag_pool}
      POSTGRES_DB:       ${POSTGRES_DB:-bdagpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/pool-schema.sql:/docker-entrypoint-initdb.d/01-pool-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdag_pool} -d ${POSTGRES_DB:-bdagpool}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --------------------------------------------------------------------------
  # BlockDAG node + nodeworker supervisor. Optional SNAPSHOT_PATH at build time.
  # --------------------------------------------------------------------------
  node:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8150}:8150"
      - "${BDAG_RPC_PORT:-38131}:38131"
      - "${EVM_HTTP_PORT:-18545}:18545"
      - "${EVM_WS_PORT:-18546}:18546"
      - "${NODE_METRICS_PORT:-6060}:6060"
    environment:
      NODE_ARGS_APPEND: ${NODE_ARGS_APPEND:---fastartifactsync}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: ${BDAG_FASTSNAP_NETWORK:-mainnet}
      BDAG_FASTSNAP_PEERS: ${BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${BDAG_FASTSNAP_TIMEOUT:-300s}
      BDAG_FASTSNAP_PARALLELISM: ${BDAG_FASTSNAP_PARALLELISM:-8}
      BDAG_FASTSNAP_RETRIES: ${BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
    volumes:
    # Note: The default behaviour is to keep any DB state from a previous run, 
    # to prevent unintentional loss of synced chain data.
    # so if you want to start fresh, you need to delete the volume explicity.
    # `docker compose down && docker volume rm <project>_node-data`\

      - node-data:/var/lib/bdagStack/node
      - nodeworker-data:/var/lib/bdagStack/nodeworker
      # node.conf in project root (copy from node.conf.example). gitignored.
      - ./node.conf:/etc/bdagStack/node.conf:ro

  # --------------------------------------------------------------------------
  # Dedicated hot-snapshot node. It syncs separately from the pool RPC node so
  # the hotsnap refresher can stop it for consistent exports without pool RPC
  # downtime.
  # --------------------------------------------------------------------------
  snapshot-node:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${SNAPSHOT_P2P_PORT:-9150}:8150"
      - "${SNAPSHOT_BDAG_RPC_PORT:-48131}:38131"
      - "${SNAPSHOT_EVM_HTTP_PORT:-28545}:18545"
      - "${SNAPSHOT_EVM_WS_PORT:-28546}:18546"
      - "${SNAPSHOT_NODE_METRICS_PORT:-16060}:6060"
    environment:
      NODE_ARGS_APPEND: ${SNAPSHOT_NODE_ARGS_APPEND:---fastartifactsync}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${SNAPSHOT_BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${SNAPSHOT_BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${SNAPSHOT_BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${SNAPSHOT_BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${SNAPSHOT_BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: ${BDAG_FASTSNAP_NETWORK:-mainnet}
      BDAG_FASTSNAP_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${SNAPSHOT_BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${SNAPSHOT_BDAG_FASTSNAP_TIMEOUT:-300s}
      BDAG_FASTSNAP_PARALLELISM: ${SNAPSHOT_BDAG_FASTSNAP_PARALLELISM:-8}
      BDAG_FASTSNAP_RETRIES: ${SNAPSHOT_BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${SNAPSHOT_BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
    volumes:
      - snapshot-node-data:/var/lib/bdagStack/node
      - snapshot-nodeworker-data:/var/lib/bdagStack/nodeworker
      - ./node.conf:/etc/bdagStack/node.conf:ro

  # --------------------------------------------------------------------------
  # Hot staged snapshot refresher. Default-on unless BDAG_HOTSNAP_ENABLED=0.
  # Uses Docker socket access to stop only snapshot-node, export a consistent
  # snapshot.bdsnap into its datadir, then restart snapshot-node.
  # --------------------------------------------------------------------------
  hotsnap:
    image: docker:27-cli
    restart: unless-stopped
    depends_on:
      snapshot-node: { condition: service_started }
    environment:
      BDAG_HOTSNAP_ENABLED: ${BDAG_HOTSNAP_ENABLED:-1}
      BDAG_HOTSNAP_INTERVAL: ${BDAG_HOTSNAP_INTERVAL:-1h}
      BDAG_HOTSNAP_INITIAL_DELAY: ${BDAG_HOTSNAP_INITIAL_DELAY:-10m}
      BDAG_HOTSNAP_STOP_TIMEOUT: ${BDAG_HOTSNAP_STOP_TIMEOUT:-60}
      BDAG_HOTSNAP_DATADIR: ${BDAG_HOTSNAP_DATADIR:-/var/lib/bdagStack/node/mainnet}
      BDAG_HOTSNAP_ARCHIVE: ${BDAG_HOTSNAP_ARCHIVE:-/var/lib/bdagStack/node/mainnet/snapshot.bdsnap}
      BDAG_HOTSNAP_CHUNK_SIZE: ${BDAG_HOTSNAP_CHUNK_SIZE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/hotsnap-refresh.sh:/usr/local/bin/hotsnap-refresh.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/hotsnap-refresh.sh", "loop"]

  # --------------------------------------------------------------------------
  # Mining pool. Connects to node RPC and Postgres.
  # --------------------------------------------------------------------------
  pool:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile}
      target: pool
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      node:     { condition: service_started }
    environment:
      # Compose interpolates ${...} from the project root .env file.
      NODE_RPC_URL: http://node:38131
      PG_URL:       postgres://${POSTGRES_USER:-bdag_pool}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bdagpool}?sslmode=disable
      # Stratum listen (inside container) — from root .env
      POOL_BIND_ADDR:     ${POOL_BIND_ADDR:-0.0.0.0:3334}
      NODE_RPC_USER:      ${NODE_RPC_USER:-test}
      NODE_RPC_PASS:      ${NODE_RPC_PASS:-test}
      PPLNS_N_WORK:       ${PPLNS_N_WORK:-1000}
      POOL_FEE_PERCENTAGE: ${POOL_FEE_PERCENTAGE:-1.0}
      POOL_BLOCK_MATURITY: ${POOL_BLOCK_MATURITY:-10}
      POOL_PAYOUT_MATURITY: ${POOL_PAYOUT_MATURITY:-4096}
      WALLET_RPC_URL:     ${WALLET_RPC_URL:-}
      POOL_PRIVATE_KEY:   ${POOL_PRIVATE_KEY:-}
      METRICS_ADDR:       ${METRICS_ADDR:-0.0.0.0:9198}
      POOL_INSTANCE_ID:   ${POOL_INSTANCE_ID:-}
    ports:
      - "${POOL_BIND_PORT:-3334}:3334"
      - "${POOL_API_PORT:-9090}:9090"



  # --------------------------------------------------------------------------
  # Dashboard. just uses rpc calls so far
  # --------------------------------------------------------------------------

  dashboard:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile}
      target: dashboard
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      node: { condition: service_started }
      pool: { condition: service_started }
    environment:
      BDAG_RPC_URL: http://node:38131
      # Must match node.conf rpcuser / rpcpass (same as pool service).
      NODE_RPC_USER: ${NODE_RPC_USER:-test}
      NODE_RPC_PASS: ${NODE_RPC_PASS:-test}
      DASHBOARD_EVM_RPC_URL: http://node:18545
      DASHBOARD_LISTEN: 0.0.0.0:9280
      DASHBOARD_RPC_POLL_SECONDS: 5
      DASHBOARD_MAX_POINTS: 120
      DASHBOARD_MINING_MAX_BARS: 48
      DASHBOARD_MINING_POLL_INTERVAL: 10m
      MINING_POOL_ADDRESS: ${MINING_POOL_ADDRESS:-0x0000000000000000000000000000000000000000}
    ports:
      - "${DASHBOARD_HOST_PORT:-9280}:9280"
    volumes:
      - ./dashboard/logs:/app/logs
volumes:
  postgres-data:
  node-data:
  nodeworker-data:
  snapshot-node-data:
  snapshot-nodeworker-data:
