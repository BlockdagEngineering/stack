# Pool-Stack Docker Compose
#
# Build layout (use .env to select):
# - Git checkout (dev):  BUILD_CONTEXT=..  DOCKERFILE=pool-stack-docker/dockerfile-dev
#   Local clones live next to this repo as ../blockdag-corechain, ../asic-pool, …
#
# - GitHub release tarball: unpacked directory is BUILD_CONTEXT=.
#   DOCKERFILE=dockerfile-cpu-release | dockerfile-pool-release
#   See .env.cpu.example / .env.pool.example — binaries come from ./bin only.
#
# Optional build-time snapshot: SNAPSHOT_PATH is a .bdsnap path relative to
# Build context for dev dockerfile-dev is ../ so COPY can reach sibling repos:
# ../blockdag-corechain, ../asic-pool, ../cpu-miner, ../pool-stack (exporter —
# optionally use pool-stack-docker/scripts/bdag_netdata_exporter.py if vendored).

# Usage:
#   cp .env.cpu.example .env   # or .env.pool.example (no miner / pool-only tarball)

# When SNAPSHOT_PATH is unset or empty in .env:
# Dev (BUILD_CONTEXT=..): default below points at the marker under this repo.
# Release tarball (BUILD_CONTEXT=.): set SNAPSHOT_PATH=docker/no-snapshot.marker in .env
# (see .env.cpu.example).

# When unset or empty in .env, use the marker file (< 1KB) so the node image skips snap import.
# Override with a path relative to BUILD_CONTEXT (parent dir in dev), e.g.
# blockdag-corechain/snapshot/foo.bdsnap — see .env.cpu.example.
x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-pool-stack-docker/docker/no-snapshot.marker}

services:

  # --------------------------------------------------------------------------
  # PostgreSQL for the mining pool. Schema is applied automatically on first
  # boot via /docker-entrypoint-initdb.d.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-bdag_pool}
      POSTGRES_DB:       ${POSTGRES_DB:-bdagpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/pool-schema.sql:/docker-entrypoint-initdb.d/01-pool-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdag_pool} -d ${POSTGRES_DB:-bdagpool}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --------------------------------------------------------------------------
  # BlockDAG node + nodeworker supervisor. Optional SNAPSHOT_PATH at build time.
  # --------------------------------------------------------------------------
  node:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile-dev}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8150}:8150"
      - "${BDAG_RPC_PORT:-38131}:38131"
      - "${EVM_HTTP_PORT:-18545}:18545"
      - "${EVM_WS_PORT:-18546}:18546"
      - "${NODE_METRICS_PORT:-6060}:6060"
    volumes:
      # Named volume hides `/var/lib/bdagStack/node` from the image. Snapshots imported
      # at **build** time live in the image layers; if this volume already existed from an
      # older run (e.g. genesis-only sync), it masks that chain state — delete it after
      # rebuilding with a new SNAPSHOT_PATH: `docker compose down && docker volume rm <project>_node-data`
      - node-data:/var/lib/bdagStack/node
      - nodeworker-data:/var/lib/bdagStack/nodeworker
      # node.conf in project root (copy from node.conf.example). gitignored.
      - ./node.conf:/etc/bdagStack/node.conf:ro

  # --------------------------------------------------------------------------
  # Mining pool. Connects to node RPC and Postgres.
  # --------------------------------------------------------------------------
  pool:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile-dev}
      target: pool
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      node:     { condition: service_started }
    environment:
      # Compose interpolates ${...} from the project root .env file.
      NODE_RPC_URL: http://node:38131
      PG_URL:       postgres://${POSTGRES_USER:-bdag_pool}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bdagpool}?sslmode=disable
      # Stratum listen (inside container) — from root .env
      POOL_BIND_ADDR:     ${POOL_BIND_ADDR:-0.0.0.0:3334}
      NODE_RPC_USER:      ${NODE_RPC_USER:-test}
      NODE_RPC_PASS:      ${NODE_RPC_PASS:-test}
      PPLNS_N_WORK:       ${PPLNS_N_WORK:-1000}
      POOL_FEE_PERCENTAGE: ${POOL_FEE_PERCENTAGE:-1.0}
      POOL_BLOCK_MATURITY: ${POOL_BLOCK_MATURITY:-10}
      POOL_PAYOUT_MATURITY: ${POOL_PAYOUT_MATURITY:-4096}
      WALLET_RPC_URL:     ${WALLET_RPC_URL:-}
      POOL_PRIVATE_KEY:   ${POOL_PRIVATE_KEY:-}
      METRICS_ADDR:       ${METRICS_ADDR:-}
      POOL_INSTANCE_ID:   ${POOL_INSTANCE_ID:-}
    ports:
      - "${POOL_BIND_PORT:-3334}:3334"
      - "${POOL_API_PORT:-8080}:8080"

  # --------------------------------------------------------------------------
  # Netdata exporter (Python; scrapes node RPC + pool API, exposes Prometheus
  # text on :9198 for Netdata to scrape).
  # --------------------------------------------------------------------------
  exporter:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile-dev}
      target: exporter
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      node: { condition: service_started }
      pool: { condition: service_started }
    environment:
      POOL_API_URL:      http://pool:8080/stats
      BDAG_RPC_URL:      http://node:38131
      # EVM JSON-RPC for eth_syncing (defaults to same host:18545 if unset)
      BDAG_EVM_RPC_URL:  ${BDAG_EVM_RPC_URL:-http://node:18545}
      BDAG_RPC_USER:     ${NODE_RPC_USER:-test}
      BDAG_RPC_PASSWORD: ${NODE_RPC_PASS:-test}
      BDAG_NETWORK:      ${NETWORK:-mainnet}
    ports:
      - "${EXPORTER_PORT:-9198}:9198"

  # --------------------------------------------------------------------------
  # Netdata dashboard. Scrapes the exporter at exporter:9198 and the node's
  # native metrics at node:6060.
  # --------------------------------------------------------------------------
  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    pid: host
    # SYS_ADMIN: cgroup-network plugin uses setns(); without it: "Operation not permitted" in logs.
    cap_add: [SYS_PTRACE, SYS_ADMIN]
    security_opt: [apparmor:unconfined]
    depends_on:
      exporter: { condition: service_started }
    ports:
      - "${NETDATA_PORT:-19999}:19999"
    volumes:
      - netdata-config:/etc/netdata
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./netdata/go.d.conf:/etc/netdata/go.d.conf:ro
      - ./netdata/go.d/prometheus.conf:/etc/netdata/go.d/prometheus.conf:ro
      - ./netdata/bdagstack.html:/usr/share/netdata/web/bdagstack.html:ro
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      # Resolve Docker container names (avoids cgroup-name.sh curl errors on docker.sock)
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # --------------------------------------------------------------------------
  # CPU miner (source: cpu-miner repo). On by default for Git dev via
  # COMPOSE_PROFILES=miner in .env.cpu.example; pool-only release must leave
  # COMPOSE_PROFILES unset (dockerfile-pool-release has no miner target).
  # --------------------------------------------------------------------------
  miner:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile-dev}
      target: miner
      args:
        <<: *build-args
    profiles: [miner]
    restart: unless-stopped
    depends_on:
      pool: { condition: service_started }
    environment:
      # cpu-miner reads POOL_URL / POOL_USER / POOL_PASS / WORKERS (see cpu-miner/cmd/miner/main.go).
      POOL_URL:   ${MINER_POOL_URL:-stratum+tcp://pool:3334}
      POOL_USER:  ${MINER_POOL_USER:-0x0000000000000000000000000000000000000000}
      POOL_PASS:  ${MINER_POOL_PASS:-x}
      WORKERS:    ${MINER_WORKERS:-1}

volumes:
  postgres-data:
  node-data:
  nodeworker-data:
  netdata-config:
  netdata-lib:
  netdata-cache:

