
x-mining-logging: &mining-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "2"

x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-docker/no-snapshot.marker}

x-dashboard-build-args: &dashboard-build-args
  DASHBOARD_REPO: ${DASHBOARD_REPO:-https://github.com/BlockdagEngineering/dashboard.git}
  DASHBOARD_REF: ${DASHBOARD_REF:-develop}

x-dev-source-contexts: &dev-source-contexts
  stack_src: ${STACK_SRC_CONTEXT:-.}
  blockdag_corechain: ${BLOCKDAG_CORECHAIN_CONTEXT:-.}
  pool_src: ${POOL_SRC_CONTEXT:-.}
  cpu_miner_src: ${CPU_MINER_SRC_CONTEXT:-.}
  dashboard_src: ${DASHBOARD_SRC_CONTEXT:-../dashboard}

x-node-critical: &node-critical
  tmpfs:
    - /tmp:size=${BDAG_NODE_TMPFS_SIZE:-512m},mode=1777
    - /var/tmp:size=${BDAG_NODE_TMPFS_SIZE:-512m},mode=1777
    - /run/bdag-ephemeral:size=${BDAG_NODE_TMPFS_SIZE:-512m},mode=1777
  shm_size: ${BDAG_NODE_SHM_SIZE:-512m}
  cpu_shares: ${BDAG_NODE_CPU_SHARES:-6144}
  mem_swappiness: 0
  blkio_config:
    weight: 1000
  oom_score_adj: -900
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576

x-pool-critical: &pool-critical
  cpu_shares: ${BDAG_POOL_CPU_SHARES:-5120}
  mem_swappiness: 0
  blkio_config:
    weight: 950
  oom_score_adj: -800
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576

x-dashboard-low: &dashboard-low
  cpu_shares: ${BDAG_DASHBOARD_CPU_SHARES:-128}
  blkio_config:
    weight: 100
  oom_score_adj: 300
  


services:

  # --------------------------------------------------------------------------
  # PostgreSQL for the mining pool. Schema is applied automatically on first
  # boot via /docker-entrypoint-initdb.d.
  # --------------------------------------------------------------------------
  postgres:
    <<: *pool-critical
    image: postgres:15-bookworm
    restart: unless-stopped
    logging: *mining-logging
    cpu_shares: ${BDAG_POOL_DB_CPU_SHARES:-4096}
    shm_size: ${BDAG_POOL_DB_SHM_SIZE:-256m}
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
    environment:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      POSTGRES_USER:     ${POSTGRES_USER:-bdag_pool}
      POSTGRES_DB:       ${POSTGRES_DB:-bdagpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - ${BDAG_POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./sql/pool-schema.sql:/docker-entrypoint-initdb.d/01-pool-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdag_pool} -d ${POSTGRES_DB:-bdagpool}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --------------------------------------------------------------------------
  # BlockDAG node + nodeworker supervisor. Optional SNAPSHOT_PATH at build time.
  # --------------------------------------------------------------------------
  node:
    <<: *node-critical
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      additional_contexts:
        <<: *dev-source-contexts
      args:
        <<: *build-args
    restart: unless-stopped
    logging: *mining-logging
    ports:
      - "${P2P_PORT:-8150}:8150"
      - "${BDAG_RPC_PORT:-38131}:38131"
      - "${EVM_HTTP_PORT:-18545}:18545"
      - "${EVM_WS_PORT:-18546}:18546"
      - "${NODE_METRICS_PORT:-6060}:6060"
    environment:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      BDAG_NETWORK: mainnet
      BDAG_EPHEMERAL_DIR: /run/bdag-ephemeral
      NODE_ARGS_APPEND: ${NODE_ARGS_APPEND:-}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: mainnet
      BDAG_FASTSNAP_PEERS: ${BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${BDAG_FASTSNAP_TIMEOUT:-90s}
      BDAG_FASTSNAP_ARTIFACT_V2: ${BDAG_FASTSNAP_ARTIFACT_V2:-1}
      BDAG_FASTSNAP_DIRECTORY_MODE: ${BDAG_FASTSNAP_DIRECTORY_MODE:-1}
      BDAG_FASTSNAP_DIRECTORY_STAGING: ${BDAG_FASTSNAP_DIRECTORY_STAGING:-}
      BDAG_FASTSNAP_DIRECTORY_REPLACE_EXISTING: ${BDAG_FASTSNAP_DIRECTORY_REPLACE_EXISTING:-1}
      BDAG_FASTSNAP_DIRECTORY_MOVE_STAGING: ${BDAG_FASTSNAP_DIRECTORY_MOVE_STAGING:-1}
      BDAG_FASTSNAP_PARALLELISM: ${BDAG_FASTSNAP_PARALLELISM:-4}
      BDAG_FASTSNAP_RETRIES: ${BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
      BDAG_FASTSNAP_LEDGER: ${BDAG_FASTSNAP_LEDGER:-}
      BDAG_FASTSYNC_ARTIFACT_DIRECTORY: ${BDAG_FASTSYNC_ARTIFACT_DIRECTORY:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST:-}
      SYNC_SOURCE_NODE: ${SYNC_SOURCE_NODE:-0}
      BDAG_RAWDATADIR_SOURCE_MODE: ${BDAG_RAWDATADIR_SOURCE_MODE:-auto}
      BDAG_RAWDATADIR_ARTIFACT_BASE: ${BDAG_RAWDATADIR_ARTIFACT_BASE:-./data-restore/rawdatadir}
      BDAG_STORAGE_PROFILE: ${BDAG_STORAGE_PROFILE:-auto}
      BDAG_NETWORK_TOPOLOGY: ${BDAG_NETWORK_TOPOLOGY:-auto}
      BDAG_DETECTED_NETWORK_TOPOLOGY: ${BDAG_DETECTED_NETWORK_TOPOLOGY:-}
      BDAG_ASIC_LAN_INTERFACE: ${BDAG_ASIC_LAN_INTERFACE:-}
      BDAG_ASIC_LAN_CIDRS: ${BDAG_ASIC_LAN_CIDRS:-}
      BDAG_P2P_ADVERTISE_IP: ${BDAG_P2P_ADVERTISE_IP:-}
      BDAG_P2P_INTERFACE: ${BDAG_P2P_INTERFACE:-}
      BDAG_FASTSYNC_PEER_ORDERING: ${BDAG_FASTSYNC_PEER_ORDERING:-p2p-latency}
      BDAG_FASTSYNC_APPEND_ADDPEERS: ${BDAG_FASTSYNC_APPEND_ADDPEERS:-1}
      BDAG_NO_FASTSYNC_SERVE: ${BDAG_NO_FASTSYNC_SERVE:-auto}
      BDAG_FASTARTIFACTSYNC_ENABLED: ${BDAG_FASTARTIFACTSYNC_ENABLED:-1}
      BOOTSTRAP_PEER_ADDRESSES: ${BOOTSTRAP_PEER_ADDRESSES:-}
      BDAG_FASTSYNC_PEERS: ${BDAG_FASTSYNC_PEERS:-}
      BDAG_FASTSYNC_RANGE_BLOCKS: ${BDAG_FASTSYNC_RANGE_BLOCKS:-1024}
      BDAG_FASTSYNC_PREPROCESS_WORKERS: ${BDAG_FASTSYNC_PREPROCESS_WORKERS:-1}
      BDAG_ENABLE_NODE_MINING: ${BDAG_ENABLE_NODE_MINING:-0}
      BDAG_NODE_MODULES: ${BDAG_NODE_MODULES:-Blockdag}
      BDAG_NODE_MINING_ARGS: ${BDAG_NODE_MINING_ARGS:-}
      BDAG_ENTRYPOINT_CHOWN_MODE: ${BDAG_ENTRYPOINT_CHOWN_MODE:-needed}
      BDAG_NODEWORKER_LIVENESS_TIMEOUT: ${BDAG_NODEWORKER_LIVENESS_TIMEOUT:-5m}
    volumes:
      # Host-path data is preserved across container rebuilds. To start from an
      # empty chain, stop the stack and move the configured BDAG_NODE_DATA_DIR
      # aside deliberately.

      - ${BDAG_NODE_DATA_DIR:-./data/node}:/var/lib/bdagStack/node
      - ${BDAG_NODEWORKER_DATA_DIR:-./data/nodeworker}:/var/lib/bdagStack/nodeworker
      # node.conf in project root (copy from node.conf.example). gitignored.
      - ./node.conf:/etc/bdagStack/node.conf:ro
      - ${BDAG_RAWDATADIR_ARTIFACT_BASE:-./data-restore/rawdatadir}:/fastartifact/rawdatadir:ro

  # --------------------------------------------------------------------------
  # Mining pool. Connects to node RPC and Postgres.
  # --------------------------------------------------------------------------
  pool:
    <<: *pool-critical
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    shm_size: ${BDAG_POOL_SHM_SIZE:-256m}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: pool
      additional_contexts:
        <<: *dev-source-contexts
      args:
        <<: *build-args
    restart: unless-stopped
    logging: *mining-logging
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      # Compose interpolates ${...} from the project root .env file.
      NODE_RPC_URL: http://node:38131
      NODE_RPC_URLS: ${NODE_RPC_URLS:-http://node:38131}
      POOL_SUBMIT_RPC_URLS: ${POOL_SUBMIT_RPC_URLS:-}
      POOL_RPC_BACKENDS: ${POOL_RPC_BACKENDS:-}
      POOL_RUNTIME_ADMIN_ENABLED: ${POOL_RUNTIME_ADMIN_ENABLED:-false}
      PG_URL:       postgres://${POSTGRES_USER:-bdag_pool}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bdagpool}?sslmode=disable
      # Stratum listen (inside container) — from root .env
      POOL_BIND_ADDR:     ${POOL_BIND_ADDR:-0.0.0.0:3334}
      NODE_RPC_USER:      ${NODE_RPC_USER:-test}
      NODE_RPC_PASS:      ${NODE_RPC_PASS:-test}
      PPLNS_N_WORK:       ${PPLNS_N_WORK:-1000}
      POOL_FEE_PERCENTAGE: ${POOL_FEE_PERCENTAGE:-1.0}
      POOL_BLOCK_MATURITY: ${POOL_BLOCK_MATURITY:-10}
      POOL_PAYOUT_MATURITY: ${POOL_PAYOUT_MATURITY:-4096}
      POOL_RPC_ROUTER_NODE_HEALTH_ENABLED: ${POOL_RPC_ROUTER_NODE_HEALTH_ENABLED:-true}
      POOL_TEMPLATE_TTL_REFRESH_MS: ${POOL_TEMPLATE_TTL_REFRESH_MS:-500}
      POOL_GBT_MIN_INTERVAL_MS: ${POOL_GBT_MIN_INTERVAL_MS:-1100}
      POOL_GBT_PRESSURE_INTERVAL_MS: ${POOL_GBT_PRESSURE_INTERVAL_MS:-500}
      POOL_GBT_PRESSURE_WINDOW_SECONDS: ${POOL_GBT_PRESSURE_WINDOW_SECONDS:-10}
      POOL_SUBMIT_STALE_BLOCK_CANDIDATES: ${POOL_SUBMIT_STALE_BLOCK_CANDIDATES:-false}
      POOL_MAX_BLOCK_CANDIDATE_JOB_AGE_MS: ${POOL_MAX_BLOCK_CANDIDATE_JOB_AGE_MS:-2500}
      POOL_SUBMIT_BLOCK_HEADER_V2_ENABLED: ${POOL_SUBMIT_BLOCK_HEADER_V2_ENABLED:-true}
      POOL_RPC_ROUTER_NODE_HEALTH_PROBE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_PROBE_SECONDS:-15}
      POOL_RPC_ROUTER_NODE_HEALTH_MAX_AGE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_MAX_AGE_SECONDS:-30}
      POOL_RPC_ROUTER_NODE_HEALTH_UNREADY_THRESHOLD: ${POOL_RPC_ROUTER_NODE_HEALTH_UNREADY_THRESHOLD:-3}
      POOL_RPC_ROUTER_NODE_HEALTH_ERROR_THRESHOLD: ${POOL_RPC_ROUTER_NODE_HEALTH_ERROR_THRESHOLD:-3}
      POOL_RPC_ROUTER_NODE_HEALTH_FRESH_TEMPLATE_GRACE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_FRESH_TEMPLATE_GRACE_SECONDS:-15}
      POOL_STALE_RACE_REJECT_WINDOW_SECONDS: ${POOL_STALE_RACE_REJECT_WINDOW_SECONDS:-10}
      POOL_STALE_RACE_CLIENT_RESEND_THRESHOLD: ${POOL_STALE_RACE_CLIENT_RESEND_THRESHOLD:-1}
      POOL_STALE_RACE_RECOVERY_COOLDOWN_SECONDS: ${POOL_STALE_RACE_RECOVERY_COOLDOWN_SECONDS:-1}
      POOL_EXPIRED_JOB_CLIENT_RECONNECT_THRESHOLD: ${POOL_EXPIRED_JOB_CLIENT_RECONNECT_THRESHOLD:-3}
      POOL_EXPIRED_JOB_CLIENT_RECONNECT_WINDOW_SECONDS: ${POOL_EXPIRED_JOB_CLIENT_RECONNECT_WINDOW_SECONDS:-120}
      POOL_EXPIRED_JOB_CLIENT_RECONNECT_COOLDOWN_SECONDS: ${POOL_EXPIRED_JOB_CLIENT_RECONNECT_COOLDOWN_SECONDS:-60}
      POOL_ALLOW_MULTIPLE_BLOCK_CANDIDATES_PER_JOB: ${POOL_ALLOW_MULTIPLE_BLOCK_CANDIDATES_PER_JOB:-true}
      POOL_PREEMPTIVE_BLOCK_CANDIDATE_REFRESH_ENABLED: ${POOL_PREEMPTIVE_BLOCK_CANDIDATE_REFRESH_ENABLED:-true}
      WALLET_RPC_URL:     ${WALLET_RPC_URL:-}
      POOL_PRIVATE_KEY:   ${POOL_PRIVATE_KEY:-}
      POOL_COINBASE_ADDRESS: ${POOL_COINBASE_ADDRESS:-}
      MINING_POOL_ADDRESS: ${MINING_POOL_ADDRESS:?set MINING_POOL_ADDRESS to a non-zero payout address}
      METRICS_ADDR:       ${METRICS_ADDR:-0.0.0.0:9090}
      POOL_INSTANCE_ID:   ${POOL_INSTANCE_ID:-}
    ports:
      - "${POOL_BIND_PORT:-3334}:3334"
      - "${POOL_API_PORT:-9090}:9090"



  # --------------------------------------------------------------------------
  # Canonical operations dashboard/control plane from BlockdagEngineering/dashboard.
  # --------------------------------------------------------------------------

  dashboard:
    <<: *dashboard-low
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: dashboard
      additional_contexts:
        <<: *dev-source-contexts
      args:
        <<: *dashboard-build-args
      secrets:
        - github_token
    restart: unless-stopped
    logging: *mining-logging
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
    depends_on:
      node: { condition: service_started }
      pool: { condition: service_started }
    environment:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      # The dashboard observes canonical service names. Compose-generated
      # concrete container names may include project and ordinal suffixes.
      BDAG_NODE_SERVICES: node
      BDAG_STACK_SERVICES: postgres,node,pool
      BDAG_POOL_CONTAINER: pool
      BDAG_POOL_CONTAINERS: pool
      BDAG_POOL_DB_CONTAINER: postgres
      BDAG_POOL_DB_USER: ${POSTGRES_USER:-bdag_pool}
      BDAG_POOL_DB_NAME: ${POSTGRES_DB:-bdagpool}
      BDAG_POOL_METRICS_PORT: 9090
      BDAG_NODE_RPC_URLS: node=http://node:38131
      BDAG_GLOBAL_CHAIN_RPC_URLS: node=http://node:38131
      BDAG_GLOBAL_RPC_URLS: ${BDAG_GLOBAL_RPC_URLS:-}
      BDAG_PUBLIC_RPC_URLS: ${BDAG_PUBLIC_RPC_URLS:-blockdag-engineering-rpc=https://rpc.blockdag.engineering,bdagscan-rpc=https://rpc.bdagscan.com}
      BDAG_HTTP_USER_AGENT: ${BDAG_HTTP_USER_AGENT:-Mozilla/5.0 blockdag-dashboard/1.0}
      BDAG_GLOBAL_CACHE_MAX_TIP_LAG_BLOCKS: ${BDAG_GLOBAL_CACHE_MAX_TIP_LAG_BLOCKS:-60}
      BDAG_GLOBAL_CATCHUP_MAX_BLOCKS: ${BDAG_GLOBAL_CATCHUP_MAX_BLOCKS:-240}
      BDAG_GLOBAL_CATCHUP_PASSES: ${BDAG_GLOBAL_CATCHUP_PASSES:-2}
      BDAG_GLOBAL_DEFERRED_RPC_WORKERS: ${BDAG_GLOBAL_DEFERRED_RPC_WORKERS:-12}
      BDAG_GLOBAL_RPC_MIN_WORKERS: ${BDAG_GLOBAL_RPC_MIN_WORKERS:-12}
      # Must match node.conf rpcuser / rpcpass (same as pool service).
      NODE_RPC_USER: ${NODE_RPC_USER:-test}
      NODE_RPC_PASS: ${NODE_RPC_PASS:-test}
      DASHBOARD_EVM_RPC_URL: http://node:18545
      DASHBOARD_LISTEN: ${DASHBOARD_LISTEN:-0.0.0.0:9280}
      DASHBOARD_RPC_POLL_SECONDS: 5
      DASHBOARD_MAX_POINTS: 120
      DASHBOARD_MINING_MAX_BARS: 48
      DASHBOARD_MINING_POLL_INTERVAL: 10m
      BDAG_DASHBOARD_DIRECT_STATUS_FALLBACK: ${BDAG_DASHBOARD_DIRECT_STATUS_FALLBACK:-0}
      BDAG_DASHBOARD_STATUS_CACHE_SECONDS: ${BDAG_DASHBOARD_STATUS_CACHE_SECONDS:-120}
      BDAG_DASHBOARD_SAMPLER_CACHE_SECONDS: ${BDAG_DASHBOARD_SAMPLER_CACHE_SECONDS:-120}
      BDAG_DASHBOARD_STATUS_SAMPLE_WAIT_SECONDS: ${BDAG_DASHBOARD_STATUS_SAMPLE_WAIT_SECONDS:-60}
      BDAG_STATUS_PAYLOAD_STALE_AFTER_SECONDS: ${BDAG_STATUS_PAYLOAD_STALE_AFTER_SECONDS:-120}
      BDAG_GLOBAL_BLOCK_WINDOW: ${BDAG_GLOBAL_BLOCK_WINDOW:-128}
      BDAG_GLOBAL_DEFERRED_BLOCK_WINDOW: ${BDAG_GLOBAL_DEFERRED_BLOCK_WINDOW:-64}
      BDAG_POOL_HOST: ${BDAG_POOL_HOST:-}
      BDAG_POOL_URL: ${BDAG_POOL_URL:-}
      BDAG_MINER_SCAN_TARGET: ${BDAG_MINER_SCAN_TARGET:-}
      BDAG_ASIC_LAN_CIDRS: ${BDAG_ASIC_LAN_CIDRS:-}
      BDAG_DOCKER_BRIDGE_CIDRS: ${BDAG_DOCKER_BRIDGE_CIDRS:-172.16.0.0/12}
      BDAG_ALLOW_DOCKER_BRIDGE_ASIC_IPS: ${BDAG_ALLOW_DOCKER_BRIDGE_ASIC_IPS:-0}
      BDAG_MINER_WORKER_USER: ${BDAG_MINER_WORKER_USER:-}
      BDAG_MINER_POOL_PASSWORD: ${BDAG_MINER_POOL_PASSWORD:-1234}
      MINING_POOL_ADDRESS: ${MINING_POOL_ADDRESS:?set MINING_POOL_ADDRESS to a non-zero payout address}
    ports:
      - "${DASHBOARD_HOST_PORT:-9280}:9280"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:ro
      - dashboard-runtime:/var/lib/bdag-dashboard

  # --------------------------------------------------------------------------
  # Optional CPU miner (dockerfile-dev target only). Enable with:
  #   COMPOSE_PROFILES=miner
  # --------------------------------------------------------------------------
  cpu-miner:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    profiles: [miner]
    build:
      context: .
      dockerfile: ${DOCKERFILE:-dockerfile-dev}
      target: miner
      additional_contexts:
        <<: *dev-source-contexts
      args:
        <<: *build-args
    restart: unless-stopped
    logging: *mining-logging
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
    depends_on:
      pool: { condition: service_started }
    environment:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      POOL_URL: ${MINER_POOL_URL:-stratum+tcp://pool:3334}
      POOL_USER: ${MINING_POOL_ADDRESS:-0x0000000000000000000000000000000000000000}
      POOL_PASS: ${MINER_POOL_PASS:-x}
      WORKERS: ${MINER_WORKERS:-1}

secrets:
  github_token:
    environment: GITHUB_TOKEN

volumes:
  dashboard-runtime:
