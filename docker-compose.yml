
x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-./latest.bdsnap}

x-node-critical: &node-critical
  cpu_shares: 4096
  blkio_config:
    weight: 1000
  oom_score_adj: -900

x-pool-critical: &pool-critical
  cpu_shares: 3072
  blkio_config:
    weight: 900
  oom_score_adj: -800

x-dashboard-low: &dashboard-low
  cpu_shares: 256
  blkio_config:
    weight: 100
  oom_score_adj: 300

services:

  # --------------------------------------------------------------------------
  # PostgreSQL for the mining pool. Schema is applied automatically on first
  # boot via /docker-entrypoint-initdb.d.
  # --------------------------------------------------------------------------
  postgres:
    <<: *pool-critical
    image: postgres:15-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-bdag_pool}
      POSTGRES_DB:       ${POSTGRES_DB:-bdagpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/pool-schema.sql:/docker-entrypoint-initdb.d/01-pool-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdag_pool} -d ${POSTGRES_DB:-bdagpool}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --------------------------------------------------------------------------
  # BlockDAG node + nodeworker supervisor. Optional SNAPSHOT_PATH at build time.
  # --------------------------------------------------------------------------
  node:
    <<: *node-critical
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8150}:8150"
      - "${BDAG_RPC_PORT:-38131}:38131"
      - "${EVM_HTTP_PORT:-18545}:18545"
      - "${EVM_WS_PORT:-18546}:18546"
      - "${NODE_METRICS_PORT:-6060}:6060"
    environment:
      NODE_ARGS_APPEND: ${NODE_ARGS_APPEND:---fastartifactsync}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: ${BDAG_FASTSNAP_NETWORK:-mainnet}
      BDAG_FASTSNAP_PEERS: ${BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${BDAG_FASTSNAP_TIMEOUT:-90s}
      BDAG_FASTSNAP_ARTIFACT_V2: ${BDAG_FASTSNAP_ARTIFACT_V2:-1}
      BDAG_FASTSNAP_DIRECTORY_MODE: ${BDAG_FASTSNAP_DIRECTORY_MODE:-1}
      BDAG_FASTSNAP_DIRECTORY_STAGING: ${BDAG_FASTSNAP_DIRECTORY_STAGING:-}
      BDAG_FASTSNAP_DIRECTORY_REPLACE_EXISTING: ${BDAG_FASTSNAP_DIRECTORY_REPLACE_EXISTING:-1}
      BDAG_FASTSNAP_DIRECTORY_MOVE_STAGING: ${BDAG_FASTSNAP_DIRECTORY_MOVE_STAGING:-1}
      BDAG_FASTSNAP_PARALLELISM: ${BDAG_FASTSNAP_PARALLELISM:-4}
      BDAG_FASTSNAP_RETRIES: ${BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
      BDAG_FASTSNAP_LEDGER: ${BDAG_FASTSNAP_LEDGER:-}
      BDAG_FASTSYNC_ARTIFACT_DIRECTORY: ${BDAG_FASTSYNC_ARTIFACT_DIRECTORY:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST:-}
      BDAG_NETWORK_TOPOLOGY: ${BDAG_NETWORK_TOPOLOGY:-auto}
      BDAG_DETECTED_NETWORK_TOPOLOGY: ${BDAG_DETECTED_NETWORK_TOPOLOGY:-}
      BDAG_ASIC_LAN_INTERFACE: ${BDAG_ASIC_LAN_INTERFACE:-eth0}
      BDAG_ASIC_LAN_CIDRS: ${BDAG_ASIC_LAN_CIDRS:-192.168.50.0/24}
      BDAG_ALLOW_ASIC_LAN_P2P: ${BDAG_ALLOW_ASIC_LAN_P2P:-0}
      BDAG_P2P_ADVERTISE_IP: ${BDAG_P2P_ADVERTISE_IP:-}
      BDAG_P2P_INTERFACE: ${BDAG_P2P_INTERFACE:-}
      BDAG_P2P_LAN_PEERS: ${BDAG_P2P_LAN_PEERS:-}
      BDAG_P2P_VPN_PEERS: ${BDAG_P2P_VPN_PEERS:-}
      BDAG_P2P_PUBLIC_PEERS: ${BDAG_P2P_PUBLIC_PEERS:-}
      LAN_PEER_ADDRESSES: ${LAN_PEER_ADDRESSES:-}
      VPN_PEER_ADDRESSES: ${VPN_PEER_ADDRESSES:-}
      ZEROTIER_PEER_ADDRESSES: ${ZEROTIER_PEER_ADDRESSES:-}
      BDAG_FASTSYNC_PEER_ORDERING: ${BDAG_FASTSYNC_PEER_ORDERING:-tiered-latency}
      BDAG_FASTSYNC_APPEND_ADDPEERS: ${BDAG_FASTSYNC_APPEND_ADDPEERS:-1}
      BDAG_FASTARTIFACTSYNC_ENABLED: ${BDAG_FASTARTIFACTSYNC_ENABLED:-1}
      BDAG_FASTSYNC_LAN_PREFIXES: ${BDAG_FASTSYNC_LAN_PREFIXES:-}
      BDAG_FASTSYNC_LAN_PEERS: ${BDAG_FASTSYNC_LAN_PEERS:-}
      BDAG_FASTSYNC_VPN_PEERS: ${BDAG_FASTSYNC_VPN_PEERS:-}
      BDAG_FASTSYNC_PUBLIC_PEERS: ${BDAG_FASTSYNC_PUBLIC_PEERS:-}
      BDAG_FASTSYNC_PEERS: ${BDAG_FASTSYNC_PEERS:-}
      BDAG_FASTSYNC_PREPROCESS_WORKERS: ${BDAG_FASTSYNC_PREPROCESS_WORKERS:-1}
      BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT: ${BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT:-20}
      BDAG_NODE_MAX_BAD_RESPONSES: ${BDAG_NODE_MAX_BAD_RESPONSES:-4}
      BDAG_ENTRYPOINT_CHOWN_MODE: ${BDAG_ENTRYPOINT_CHOWN_MODE:-needed}
    volumes:
    # Note: The default behaviour is to keep any DB state from a previous run, 
    # to prevent unintentional loss of synced chain data.
    # so if you want to start fresh, you need to delete the volume explicity.
    # `docker compose down && docker volume rm <project>_node-data`\

      - node-data:/var/lib/bdagStack/node
      - nodeworker-data:/var/lib/bdagStack/nodeworker
      # node.conf in project root (copy from node.conf.example). gitignored.
      - ./node.conf:/etc/bdagStack/node.conf:ro

  # --------------------------------------------------------------------------
  # Dedicated hot-snapshot node. It syncs separately from the pool RPC node so
  # the hotsnap refresher can stop it for consistent exports without pool RPC
  # downtime.
  # --------------------------------------------------------------------------
  snapshot-node:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${SNAPSHOT_P2P_PORT:-9150}:8150"
      - "${SNAPSHOT_BDAG_RPC_PORT:-48131}:38131"
      - "${SNAPSHOT_EVM_HTTP_PORT:-28545}:18545"
      - "${SNAPSHOT_EVM_WS_PORT:-28546}:18546"
      - "${SNAPSHOT_NODE_METRICS_PORT:-16060}:6060"
    environment:
      NODE_ARGS_APPEND: ${SNAPSHOT_NODE_ARGS_APPEND:---fastartifactsync}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${SNAPSHOT_BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${SNAPSHOT_BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${SNAPSHOT_BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${SNAPSHOT_BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${SNAPSHOT_BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: ${BDAG_FASTSNAP_NETWORK:-mainnet}
      BDAG_FASTSNAP_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${SNAPSHOT_BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${SNAPSHOT_BDAG_FASTSNAP_TIMEOUT:-300s}
      BDAG_FASTSNAP_PARALLELISM: ${SNAPSHOT_BDAG_FASTSNAP_PARALLELISM:-8}
      BDAG_FASTSNAP_RETRIES: ${SNAPSHOT_BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${SNAPSHOT_BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
      BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT: ${SNAPSHOT_BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT:-20}
      BDAG_NODE_MAX_BAD_RESPONSES: ${SNAPSHOT_BDAG_NODE_MAX_BAD_RESPONSES:-4}
    volumes:
      - snapshot-node-data:/var/lib/bdagStack/node
      - snapshot-nodeworker-data:/var/lib/bdagStack/nodeworker
      - ./node.conf:/etc/bdagStack/node.conf:ro

  # --------------------------------------------------------------------------
  # Hot staged snapshot refresher. Default-on unless BDAG_HOTSNAP_ENABLED=0.
  # Uses Docker socket access to stop only snapshot-node, export a consistent
  # snapshot.bdsnap into its datadir, then restart snapshot-node.
  # --------------------------------------------------------------------------
  hotsnap:
    image: docker:27-cli
    restart: unless-stopped
    depends_on:
      snapshot-node: { condition: service_started }
    environment:
      BDAG_HOTSNAP_ENABLED: ${BDAG_HOTSNAP_ENABLED:-1}
      BDAG_HOTSNAP_INTERVAL: ${BDAG_HOTSNAP_INTERVAL:-1h}
      BDAG_HOTSNAP_INITIAL_DELAY: ${BDAG_HOTSNAP_INITIAL_DELAY:-20m}
      BDAG_HOTSNAP_STOP_TIMEOUT: ${BDAG_HOTSNAP_STOP_TIMEOUT:-60}
      BDAG_HOTSNAP_DATADIR: ${BDAG_HOTSNAP_DATADIR:-/var/lib/bdagStack/node/mainnet}
      BDAG_HOTSNAP_ARCHIVE: ${BDAG_HOTSNAP_ARCHIVE:-/var/lib/bdagStack/node/mainnet/snapshot.bdsnap}
      BDAG_HOTSNAP_CHUNK_SIZE: ${BDAG_HOTSNAP_CHUNK_SIZE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/hotsnap-refresh.sh:/usr/local/bin/hotsnap-refresh.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/hotsnap-refresh.sh", "loop"]

  # --------------------------------------------------------------------------
  # Mining pool. Connects to node RPC and Postgres.
  # --------------------------------------------------------------------------
  pool:
    <<: *pool-critical
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile}
      target: pool
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      node:     { condition: service_started }
    environment:
      # Compose interpolates ${...} from the project root .env file.
      NODE_RPC_URL: http://node:38131
      NODE_RPC_URLS: ${NODE_RPC_URLS:-http://node:38131}
      POOL_SUBMIT_RPC_URLS: ${POOL_SUBMIT_RPC_URLS:-}
      POOL_RPC_BACKENDS: ${POOL_RPC_BACKENDS:-}
      POOL_RPC_ROUTER_ENABLED: ${POOL_RPC_ROUTER_ENABLED:-false}
      POOL_RPC_ROUTER_NODE_HEALTH_ENABLED: ${POOL_RPC_ROUTER_NODE_HEALTH_ENABLED:-true}
      POOL_DUPLICATE_SAFE_MULTI_BACKEND_SUBMIT: ${POOL_DUPLICATE_SAFE_MULTI_BACKEND_SUBMIT:-true}
      POOL_RPC_ROUTER_TEMPLATE_LANE_MODE: ${POOL_RPC_ROUTER_TEMPLATE_LANE_MODE:-active-passive}
      POOL_RPC_ROUTER_MIN_HEALTHY_SECONDS: ${POOL_RPC_ROUTER_MIN_HEALTHY_SECONDS:-10}
      POOL_RPC_ROUTER_SWITCH_COOLDOWN_SECONDS: ${POOL_RPC_ROUTER_SWITCH_COOLDOWN_SECONDS:-20}
      POOL_RPC_ROUTER_TEMPLATE_MAX_AGE_SECONDS: ${POOL_RPC_ROUTER_TEMPLATE_MAX_AGE_SECONDS:-5}
      POOL_RPC_ROUTER_RECOVERY_PROBE_SECONDS: ${POOL_RPC_ROUTER_RECOVERY_PROBE_SECONDS:-15}
      POOL_RPC_ROUTER_NODE_HEALTH_PROBE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_PROBE_SECONDS:-1}
      POOL_RPC_ROUTER_NODE_HEALTH_MAX_AGE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_MAX_AGE_SECONDS:-3}
      POOL_RPC_ROUTER_NODE_HEALTH_UNREADY_THRESHOLD: ${POOL_RPC_ROUTER_NODE_HEALTH_UNREADY_THRESHOLD:-1}
      POOL_RPC_ROUTER_NODE_HEALTH_ERROR_THRESHOLD: ${POOL_RPC_ROUTER_NODE_HEALTH_ERROR_THRESHOLD:-2}
      POOL_RPC_ROUTER_NODE_HEALTH_FRESH_TEMPLATE_GRACE_SECONDS: ${POOL_RPC_ROUTER_NODE_HEALTH_FRESH_TEMPLATE_GRACE_SECONDS:-5}
      POOL_RUNTIME_ADMIN_ENABLED: ${POOL_RUNTIME_ADMIN_ENABLED:-false}
      PG_URL:       postgres://${POSTGRES_USER:-bdag_pool}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bdagpool}?sslmode=disable
      # Stratum listen (inside container) — from root .env
      POOL_BIND_ADDR:     ${POOL_BIND_ADDR:-0.0.0.0:3334}
      NODE_RPC_USER:      ${NODE_RPC_USER:-test}
      NODE_RPC_PASS:      ${NODE_RPC_PASS:-test}
      PPLNS_N_WORK:       ${PPLNS_N_WORK:-1000}
      POOL_FEE_PERCENTAGE: ${POOL_FEE_PERCENTAGE:-1.0}
      POOL_BLOCK_MATURITY: ${POOL_BLOCK_MATURITY:-10}
      POOL_PAYOUT_MATURITY: ${POOL_PAYOUT_MATURITY:-4096}
      POOL_TEMPLATE_TTL_REFRESH_MS: ${POOL_TEMPLATE_TTL_REFRESH_MS:-10000}
      POOL_SUBMIT_RPC_TIMEOUT_MS: ${POOL_SUBMIT_RPC_TIMEOUT_MS:-5000}
      POOL_SUBMIT_STALE_BLOCK_CANDIDATES: ${POOL_SUBMIT_STALE_BLOCK_CANDIDATES:-false}
      POOL_MAX_BLOCK_CANDIDATE_JOB_AGE_MS: ${POOL_MAX_BLOCK_CANDIDATE_JOB_AGE_MS:-1200}
      POOL_MAX_BLOCK_CANDIDATE_SAME_TEMPLATE_AGE_MS: ${POOL_MAX_BLOCK_CANDIDATE_SAME_TEMPLATE_AGE_MS:-6000}
      POOL_MAX_BLOCK_CANDIDATE_TEMPLATE_LAG_BLOCKS: ${POOL_MAX_BLOCK_CANDIDATE_TEMPLATE_LAG_BLOCKS:-16}
      POOL_SUBMIT_BLOCK_HEADER_V2_ENABLED: ${POOL_SUBMIT_BLOCK_HEADER_V2_ENABLED:-true}
      POOL_STALE_RACE_REJECT_WINDOW_SECONDS: ${POOL_STALE_RACE_REJECT_WINDOW_SECONDS:-10}
      POOL_STALE_RACE_CLIENT_RESEND_THRESHOLD: ${POOL_STALE_RACE_CLIENT_RESEND_THRESHOLD:-1}
      POOL_STALE_RACE_RECOVERY_COOLDOWN_SECONDS: ${POOL_STALE_RACE_RECOVERY_COOLDOWN_SECONDS:-1}
      POOL_ALLOW_MULTIPLE_BLOCK_CANDIDATES_PER_JOB: ${POOL_ALLOW_MULTIPLE_BLOCK_CANDIDATES_PER_JOB:-true}
      POOL_PREEMPTIVE_BLOCK_CANDIDATE_REFRESH_ENABLED: ${POOL_PREEMPTIVE_BLOCK_CANDIDATE_REFRESH_ENABLED:-true}
      WALLET_RPC_URL:     ${WALLET_RPC_URL:-}
      POOL_PRIVATE_KEY:   ${POOL_PRIVATE_KEY:-}
      POOL_COINBASE_ADDRESS: ${POOL_COINBASE_ADDRESS:-}
      MINING_POOL_ADDRESS: ${MINING_POOL_ADDRESS:?set MINING_POOL_ADDRESS to a non-zero payout address}
      METRICS_ADDR:       ${METRICS_ADDR:-0.0.0.0:9090}
      POOL_INSTANCE_ID:   ${POOL_INSTANCE_ID:-}
    ports:
      - "${POOL_BIND_PORT:-3334}:3334"
      - "${POOL_API_PORT:-9090}:9090"



  # --------------------------------------------------------------------------
  # Dashboard. just uses rpc calls so far
  # --------------------------------------------------------------------------

  dashboard:
    <<: *dashboard-low
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${DOCKERFILE:-pool-stack-docker/dockerfile}
      target: dashboard
      args:
        <<: *build-args
    restart: unless-stopped
    depends_on:
      node: { condition: service_started }
      pool: { condition: service_started }
    environment:
      BDAG_RPC_URL: http://node:38131
      # Must match node.conf rpcuser / rpcpass (same as pool service).
      NODE_RPC_USER: ${NODE_RPC_USER:-test}
      NODE_RPC_PASS: ${NODE_RPC_PASS:-test}
      DASHBOARD_EVM_RPC_URL: http://node:18545
      DASHBOARD_LISTEN: 0.0.0.0:9280
      DASHBOARD_RPC_POLL_SECONDS: 5
      DASHBOARD_MAX_POINTS: 120
      DASHBOARD_MINING_MAX_BARS: 48
      DASHBOARD_MINING_POLL_INTERVAL: 10m
      MINING_POOL_ADDRESS: ${MINING_POOL_ADDRESS:?set MINING_POOL_ADDRESS to a non-zero payout address}
    ports:
      - "${DASHBOARD_HOST_PORT:-9280}:9280"
    volumes:
      - ./dashboard/logs:/app/logs
volumes:
  postgres-data:
  node-data:
  nodeworker-data:
  snapshot-node-data:
  snapshot-nodeworker-data:
