# BlockDAG pool stack: Prometheus text from custom exporter + node native metrics.
# Service names resolve on the compose network. Chart IDs include these job names
# (see netdata/bdagstack.html).
jobs:
  - name: bdag_chain_pool_local
    url: http://exporter:9198/metrics
  - name: bdag_node_native_local
    url: http://node:6060/metrics
