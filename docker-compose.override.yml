# Live Linux host override.
#
# Keep temporary filesystem churn in RAM and preserve service-level I/O
# priorities for the mining stack. Node gets the highest disk I/O weight,
# pool/Postgres stay high priority, and dashboard/ops services stay low
# priority so chain sync and Stratum work are not starved by observability.
services:
  pool-db:
    blkio_config:
      weight: 950
  node:
    blkio_config:
      weight: 1000
    environment:
      BLOCKLIST_GENESIS_BLOCKED: ""
      BLOCKLIST_GENESIS_OWNER: ""
      BLOCKLIST_CONTRACT_CODE: ""
      BDAG_NODE_PEER_ADDRESSES: "/ip4/169.0.254.182/tcp/8150/p2p/16Uiu2HAmGsEDGnDGhvziZR1UQSELTDihXRKYMB6SrbEQ6NsWBVqD,/ip4/169.0.254.182/tcp/8150/p2p/16Uiu2HAkvqHHYUigCqaoRjychuh1hR8gqhq99WU5Yi3hYeLxTNTj,/ip4/102.182.77.16/tcp/8150/p2p/16Uiu2HAm99a8KYuUkL5LGEQbpRNhz5nzScrwYpEh47BfSaVMCg5G,/ip4/16.28.133.168/tcp/8150/p2p/16Uiu2HAm9UcTayJDSajjJYsWwVaN2qqGeczcs9kXse3dMdvGDRjz,/ip4/16.28.133.168/tcp/8150/p2p/16Uiu2HAkvWqB4Hw3qVwNU8MuBqLeAvRWzMhfLsQ5LDQbZdR9hUSK,/ip4/16.28.133.168/tcp/8150/p2p/16Uiu2HAkvnS42JoJSUNawLmbsHio2ikQWNWXqSMsTf6UXLRcmsXS,/ip4/129.121.92.232/tcp/8151/p2p/16Uiu2HAky3sW22sa9VTPab5BG9g7hEoTw4dsnCfNaPZW9yH3L6Cq,/ip4/3.126.64.13/tcp/8152/p2p/16Uiu2HAmEFxRaBbbf3sRi43CCvMk5Y6zPkuGY9s4uRK2FKJVJkqo"
      BDAG_NODE_PEER_LIMIT: "32"
  pool:
    blkio_config:
      weight: 950
  collector:
    blkio_config:
      weight: 100
  watchdog:
    blkio_config:
      weight: 100
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
  sentinel:
    blkio_config:
      weight: 100
    tmpfs:
      - /tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
      - /var/tmp:size=${BDAG_CONTAINER_TMPFS_SIZE:-128m},mode=1777
  dashboard:
    blkio_config:
      weight: 100
