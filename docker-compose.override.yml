# Local override for macOS Docker Desktop: its Linux VM has no cgroup v2 "io"
# controller, so blkio_config (io.weight) makes runc fail at container start.
# This file is auto-loaded by `docker compose` and only neutralizes those knobs.
services:
  pool-db:
    blkio_config: !reset null
  node:
    blkio_config: !reset null
    # Dev e2e for the WalletBlocklist upgrade: seed a throwaway address into the
    # genesis blocklist. Changing genesis requires a fresh node-data volume.
    environment:
      BLOCKLIST_GENESIS_BLOCKED: "0x000000000000000000000000000000000000dEaD"
      BLOCKLIST_GENESIS_OWNER: "0xEd5e2dD1377aBe28907673cdEa8c2c04Fb715dcd"
  pool:
    blkio_config: !reset null
  collector:
    blkio_config: !reset null
  watchdog:
    blkio_config: !reset null
  sentinel:
    blkio_config: !reset null
  dashboard:
    blkio_config: !reset null
