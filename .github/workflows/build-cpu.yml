name: Build binaries for blockdag-pool-stack

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.2.3"
        required: true
  push:
    tags:
      - "cpu-v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22.x"
  PACKAGE_NAME: "pool-stack-docker"

jobs:
  build-and-package:
    # ubuntu-latest (~24.04) matches dockerfile-* ubuntu:24.04 runtime glibc.
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout packaging repo
        uses: actions/checkout@v4

      # Use PRIVATE_REPO_TOKEN when set (PAT with Contents: Read on both repos).
      # If unset, falls back to github.token (works only if org allows this workflow to read those private repos).
      - name: Checkout private blockdag repo
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/blockdag-corechain
          ref: codex/fast-artifact-sync-v2-core
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/blockdag-node

      - name: Checkout private mining pool repo
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/pool
          ref: 0d22a385c7b738f8e4fa93d63dee7373428d3bae
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/pool

      - name: Checkout private cpu miner repo
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/cpu-miner
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/cpu-miner

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build blockdag-node
        shell: bash
        run: |
          mkdir -p ./bin
          cd src/blockdag-node
          make all
          cp -f ./build/bin/bdag ../../bin/blockdag-node
          cp -f ./build/bin/nodeworker ../../bin/nodeworker
          cp -f ./build/bin/fastsnap ../../bin/fastsnap

      - name: Build mining-pool
        shell: bash
        run: |
          cd src/pool
          go build -o build/bin/pool ./cmd/pool
          cp -f ./build/bin/pool ../../bin/mining-pool

      - name: Build cpu-miner
        shell: bash
        run: |
          cd src/cpu-miner
          go build -o build/bin/miner ./cmd/miner
          cp -f ./build/bin/miner ../../bin/cpu-miner

      - name: Ensure executables
        run: chmod +x bin/blockdag-node bin/nodeworker bin/fastsnap bin/mining-pool bin/cpu-miner

      - name: Generate checksums
        shell: bash
        run: |
          sha256sum bin/blockdag-node bin/nodeworker bin/fastsnap bin/mining-pool bin/cpu-miner > checksums.txt

      - name: Validate compose (CPU Dockerfile + miner profile)
        shell: bash
        run: |
          set -euo pipefail
          test -f .env.cpu.example
          docker compose --env-file .env.cpu.example --profile miner config > /tmp/compose.cpu-miner.yml
          grep -q '^  miner:' /tmp/compose.cpu-miner.yml || { echo "::error::Resolved compose must include miner service when profile miner is active"; exit 1; }
          scripts/validate-pi5-restart-hardening.sh .

      - name: Create release tarball
        id: package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          OUT="${PACKAGE_NAME}-${VERSION}.tar.gz"
          # Do not bundle snapshots/latest.bdsnap — exceeds GitHub's 2GiB-per-asset limit.

          test -f .env.cpu.example && test -f .env.pool.example || { echo "::error::Missing .env.cpu.example or .env.pool.example"; exit 1; }

          ROOT="${PACKAGE_NAME}-${VERSION}"
          rm -rf "${ROOT}"
          mkdir "${ROOT}"
          cp docker-compose.yml dockerfile-cpu-release .dockerignore .env.cpu.example .env.pool.example node.conf.example README.md SNAPSHOT-README.md checksums.txt haproxy.cfg "${ROOT}/"
          cp -a sql netdata scripts bin docker asic-pool tools "${ROOT}/"
          rsync -a --exclude='runtime/' --exclude='runtime-*/' --exclude='__pycache__/' --exclude='*.pyc' ops "${ROOT}/"

          tar -czf "${OUT}" "${ROOT}"
          rm -rf "${ROOT}"

          ls -lh "${OUT}"
          SZ="$(stat -c%s "${OUT}")"
          MAX=$((2 * 1024 * 1024 * 1024 - 256 * 1024 * 1024))
          if [ "${SZ}" -gt "${MAX}" ]; then
            echo "::error::Tarball ${SZ} bytes exceeds safe GitHub limit (~2GiB cap minus headroom)"
            exit 1
          fi
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: ${{ steps.package.outputs.artifact }}
          draft: false
          prerelease: false
