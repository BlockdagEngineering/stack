name: RC hardening gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "release/**"

permissions:
  contents: read

jobs:
  source-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python compile
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m compileall -q ops scripts

      - name: Tracked secret scan
        run: python3 scripts/secret-scan-tracked-files.py

      - name: Unit tests
        run: BDAG_RUNTIME_DIR="$RUNNER_TEMP/bdag-runtime" PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s ops/tests -p 'test_*.py'

      - name: Script tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/release_readiness_check_test.py

      - name: Shell syntax
        run: |
          bash -n \
            ops/deploy-live-runtime-update.sh \
            ops/release-install.sh \
            scripts/validate-release-build.sh \
            scripts/release/installers/install-unix-common.sh

      - name: Documentation consistency
        run: python3 scripts/check-doc-consistency.py

      - name: Remove generated Python bytecode
        run: |
          rm -rf ops/runtime
          rm -rf "$RUNNER_TEMP/bdag-runtime"
          find ops scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          find ops scripts -name '*.pyc' -delete

      - name: Release build validator
        run: bash scripts/validate-release-build.sh .
