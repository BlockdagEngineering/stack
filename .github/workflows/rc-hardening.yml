name: RC hardening gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "release/**"

permissions:
  contents: read

jobs:
  source-hardening:
    runs-on: ubuntu-latest
    env:
      BDAG_RUNTIME_DIR: ${{ runner.temp }}/bdag-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python compile
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m compileall -q ops scripts

      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s ops/tests -p 'test_*.py'

      - name: Shell syntax
        run: |
          bash -n \
            ops/build-pi5-arm64-release.sh \
            ops/deploy-live-runtime-update.sh \
            ops/release-install.sh \
            scripts/validate-pi5-restart-hardening.sh \
            scripts/release/installers/install-unix-common.sh

      - name: Documentation consistency
        run: python3 scripts/check-doc-consistency.py

      - name: Remove generated Python bytecode
        run: |
          rm -rf ops/runtime
          find ops scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          find ops scripts -name '*.pyc' -delete

      - name: Pi5 restart hardening validator
        run: bash scripts/validate-pi5-restart-hardening.sh --mode source .
