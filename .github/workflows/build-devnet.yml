name: Build devnet release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Devnet release version, e.g. devnet-v0.1.0"
        required: true
  push:
    tags:
      - "devnet-v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"
  GOFLAGS: "-buildvcs=false"
  PACKAGE_NAME: "blockdag-devnet"

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goarch: amd64
            cc: gcc
            docker_platform: linux/amd64
          - target: linux-arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            docker_platform: linux/arm64
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          ref: devnet

      - name: Checkout blockdag-corechain devnet
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/blockdag-corechain
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/blockdag-node
          ref: devnet

      - name: Checkout pool devnet
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/pool
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/pool
          ref: devnet

      - name: Checkout dashboard2 devnet
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/dashboard2
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/dashboard
          ref: devnet

      - name: Checkout collector devnet
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/collector
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/collector
          ref: devnet

      - name: Verify upstream checkouts
        shell: bash
        run: |
          set -euo pipefail
          verify_file() {
            local name="$1"
            local path="$2"
            if [[ ! -f "$path" ]]; then
              echo "::error::Upstream checkout '$name' missing $path"
              exit 1
            fi
            echo "ok: $name ($path)"
          }
          verify_file blockdag-corechain src/blockdag-node/cmd/bdag/bdag.go
          verify_file blockdag-corechain src/blockdag-node/cmd/nodeworker/main.go
          verify_file blockdag-corechain src/blockdag-node/cmd/devnet-cpuminer/main.go
          verify_file pool src/pool/cmd/pool/main.go
          verify_file pool src/pool/cmd/dashboard-api/main.go
          verify_file dashboard2 src/dashboard/main.go
          collector_entry="$(find src/collector -type f -name collector.py -not -path '*/.git/*' -print -quit)"
          if [[ -z "${collector_entry}" ]]; then
            echo "::error::Upstream checkout 'collector' missing collector.py"
            exit 1
          fi
          echo "ok: collector (${collector_entry})"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install packaging and cross-build tools
        shell: bash
        run: |
          set -euo pipefail
          packages=(zip rsync)
          if [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
            packages+=(gcc-aarch64-linux-gnu libc6-dev-arm64-cross)
          fi
          sudo apt-get update
          sudo apt-get install -y "${packages[@]}"

      - name: Build blockdag node and devnet miner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./bin
          cd src/blockdag-node
          BUILD_REF="$(git rev-parse --short=7 HEAD)"
          common_env=(
            GOOS=linux
            GOARCH=${{ matrix.goarch }}
            CGO_ENABLED=1
            CC=${{ matrix.cc }}
            GOFLAGS=-buildvcs=false
          )
          env "${common_env[@]}" go build -trimpath \
            -ldflags="-X github.com/BlockdagNetworkLabs/bdag/version.Build=devnet-${BUILD_REF}" \
            -o ../../bin/blockdag-node ./cmd/bdag
          env "${common_env[@]}" go build -trimpath \
            -ldflags="-X github.com/BlockdagNetworkLabs/bdag/version.Build=devnet-${BUILD_REF}" \
            -o ../../bin/nodeworker ./cmd/nodeworker
          env "${common_env[@]}" go build -trimpath \
            -ldflags="-X github.com/BlockdagNetworkLabs/bdag/version.Build=devnet-${BUILD_REF}" \
            -o ../../bin/devnet-cpuminer ./cmd/devnet-cpuminer

      - name: Build pool
        shell: bash
        run: |
          set -euo pipefail
          cd src/pool
          common_env=(
            GOOS=linux
            GOARCH=${{ matrix.goarch }}
            CGO_ENABLED=1
            CC=${{ matrix.cc }}
            GOFLAGS=-buildvcs=false
          )
          env "${common_env[@]}" go build -buildvcs=false -trimpath -o build/bin/pool ./cmd/pool
          env "${common_env[@]}" go build -buildvcs=false -trimpath -o build/bin/dashboard-api ./cmd/dashboard-api
          cp -f ./build/bin/pool ../../bin/mining-pool
          cp -f ./build/bin/dashboard-api ../../bin/dashboard-api

      - name: Build dashboard
        shell: bash
        run: |
          set -euo pipefail
          cd src/dashboard
          env GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 GOFLAGS=-buildvcs=false \
            go build -trimpath -o ../../bin/dashboard .

      - name: Ensure executables
        run: chmod +x bin/blockdag-node bin/nodeworker bin/mining-pool bin/dashboard-api bin/dashboard bin/devnet-cpuminer

      - name: Verify release architecture
        shell: bash
        run: |
          scripts/verify-release-architecture.py --target "${{ matrix.target }}" \
            bin/blockdag-node \
            bin/nodeworker \
            bin/mining-pool \
            bin/dashboard-api \
            bin/dashboard \
            bin/devnet-cpuminer

      - name: Generate checksums
        shell: bash
        run: |
          sha256sum bin/blockdag-node bin/nodeworker bin/mining-pool bin/dashboard-api bin/dashboard bin/devnet-cpuminer > checksums.txt

      - name: Prepare release devnet env
        shell: bash
        run: |
          set -euo pipefail
          cp .env.devnet.example devnet-release.env
          python3 - <<'PY'
          from pathlib import Path

          path = Path("devnet-release.env")
          values = {
              "DOCKERFILE": "dockerfile",
              "DOCKER_PLATFORM": "${{ matrix.docker_platform }}",
              "STACK_SRC_CONTEXT": ".",
              "BLOCKDAG_CORECHAIN_CONTEXT": ".",
              "POOL_SRC_CONTEXT": ".",
              "COLLECTOR_SRC_CONTEXT": "./collector",
              "DASHBOARD_SRC_CONTEXT": ".",
          }
          lines = path.read_text(encoding="utf-8").splitlines()
          seen = set()
          out = []
          for line in lines:
              if "=" not in line or line.lstrip().startswith("#"):
                  out.append(line)
                  continue
              key = line.split("=", 1)[0]
              if key in values:
                  out.append(f"{key}={values[key]}")
                  seen.add(key)
              else:
                  out.append(line)
          for key, value in values.items():
              if key not in seen:
                  out.append(f"{key}={value}")
          path.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Validate devnet compose
        shell: bash
        env:
          BDAG_STACK_HOST_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          docker compose --env-file devnet-release.env -f docker-compose.yml -f docker-compose.devnet.yml config --services | grep -qx cpu-miner
          docker compose --env-file devnet-release.env -f docker-compose.yml -f docker-compose.devnet.yml config | grep -q 'dockerfile: dockerfile'

      - name: Devnet installer smoke test
        shell: bash
        run: python3 scripts/devnet_install_smoke.py

      - name: Create devnet runtime payload zip
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          TARGET="${{ matrix.target }}"
          ROOT="${PACKAGE_NAME}-${VERSION}-${TARGET}"
          OUT="${ROOT}.zip"
          OUT_SHA256="${OUT}.sha256"

          test -f devnet-release.env || { echo "::error::Missing generated devnet env"; exit 1; }
          test -f scripts/devnet/install.sh || { echo "::error::Missing devnet installer"; exit 1; }
          test -f scripts/devnet/install.ps1 || { echo "::error::Missing devnet PowerShell installer"; exit 1; }

          cat > release-payload.env <<EOF
          BDAG_RELEASE_VERSION=${VERSION}
          BDAG_RELEASE_PAYLOAD_TARGET=${TARGET}
          BDAG_RELEASE_PAYLOAD_ARCH=${{ matrix.goarch }}
          DOCKER_PLATFORM=${{ matrix.docker_platform }}
          EOF

          rm -rf "${ROOT}" "${OUT}" "${OUT_SHA256}" smoke-root
          mkdir -p "${ROOT}/docs"
          cp docker-compose.yml docker-compose.devnet.yml dockerfile .dockerignore .env.example node.devnet.conf README.md checksums.txt release-payload.env "${ROOT}/"
          cp devnet-release.env "${ROOT}/.env.devnet.example"
          cp docs/devnet-release.md "${ROOT}/docs/devnet-release.md"
          echo "${VERSION}" > "${ROOT}/version.txt"
          cp scripts/devnet/install.sh "${ROOT}/install.sh"
          cp scripts/devnet/install.ps1 "${ROOT}/install.ps1"
          cp -a bin sql docker tools "${ROOT}/"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.pytest_cache/' \
            --exclude='__pycache__/' \
            --exclude='runtime/' \
            --exclude='runtime-*/' \
            --exclude='data/' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            src/collector/ "${ROOT}/collector/"
          collector_entry="$(find "${ROOT}/collector" -type f -name collector.py -not -path '*/.git/*' -print -quit)"
          if [[ -z "${collector_entry}" ]]; then
            echo "::error::Collector payload is missing collector.py"
            exit 1
          fi
          if [[ "${collector_entry}" != "${ROOT}/collector/collector.py" ]]; then
            cp "${collector_entry}" "${ROOT}/collector/collector.py"
          fi
          rsync -a --exclude='__pycache__/' --exclude='*.pyc' scripts "${ROOT}/"
          rsync -a --exclude='runtime/' --exclude='runtime-*/' --exclude='__pycache__/' --exclude='*.pyc' ops "${ROOT}/"
          chmod +x "${ROOT}/install.sh" "${ROOT}/scripts/devnet/install.sh"

          cp -a "${ROOT}" smoke-root
          python3 scripts/devnet_install_smoke.py --package-root smoke-root
          rm -rf smoke-root

          zip -qr "${OUT}" "${ROOT}"
          python3 - "${OUT}" "${ROOT}" <<'PY'
          import sys
          import zipfile

          archive, root = sys.argv[1], sys.argv[2]
          required = {
              f"{root}/collector/collector.py",
              f"{root}/bin/devnet-cpuminer",
              f"{root}/install.sh",
              f"{root}/install.ps1",
              f"{root}/.env.devnet.example",
              f"{root}/docker-compose.devnet.yml",
          }
          with zipfile.ZipFile(archive) as zf:
              names = set(zf.namelist())
          missing = sorted(required - names)
          if missing:
              for item in missing:
                  print(f"::error::Devnet release zip is missing {item}")
              raise SystemExit(1)
          PY
          python3 scripts/check-release-archive.py "${OUT}"
          sha256sum "${OUT}" > "${OUT_SHA256}"
          rm -rf "${ROOT}"

          ls -lh "${OUT}"
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"
          echo "sha256=${OUT_SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devnet-release-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.sha256 }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-and-package
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          ref: devnet

      - name: Download payload artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate pinned bootstrap assets
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/render-release-bootstrap.py \
            --version "${{ steps.version.outputs.value }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --package-name "${PACKAGE_NAME}" \
            --out-dir release-assets
          echo "${{ steps.version.outputs.value }}" > release-assets/version.txt
          ls -lh release-assets

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            release-assets/blockdag-devnet-*.zip
            release-assets/blockdag-devnet-*.zip.sha256
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/version.txt
          draft: false
          prerelease: true
