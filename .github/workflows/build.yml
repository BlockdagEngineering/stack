name: Build binaries for blockdag-pool-stack

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.2.3"
        required: true
  push:
    tags:
      - "pool-v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"
  GOFLAGS: "-buildvcs=false"
  PACKAGE_NAME: "pool-stack-docker"

jobs:
  build-and-package:
    # ubuntu-latest (~24.04) matches dockerfile-* ubuntu:24.04 runtime glibc.
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout packaging repo
        uses: actions/checkout@v4
      # Use PRIVATE_REPO_TOKEN when set (PAT with Contents: Read on both repos).
      # If unset, falls back to github.token (works only if org allows this workflow to read those private repos).
      - name: Checkout private blockdag repo
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/blockdag-corechain
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/blockdag-node
          ref: c74f88b9c1b4fbf4213e15272d3bf1f63943e839

      - name: Checkout private mining pool repo
        uses: actions/checkout@v4
        with:
          repository: BlockdagEngineering/pool
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          path: src/pool
          ref: 61b231c0501b32338f4ad47561a09e03e5933adc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build blockdag-node
        shell: bash
        run: |
          mkdir -p ./bin
          cd src/blockdag-node
          make all
          cp -f ./build/bin/bdag ../../bin/blockdag-node
          cp -f ./build/bin/nodeworker ../../bin/nodeworker
          cp -f ./build/bin/fastsnap ../../bin/fastsnap

      - name: Build mining-pool
        shell: bash
        run: |
          cd src/pool
          go build -buildvcs=false -o build/bin/pool ./cmd/pool
          go build -buildvcs=false -o build/bin/dashboard-api ./cmd/dashboard-api
          cp -f ./build/bin/pool ../../bin/mining-pool
          cp -f ./build/bin/dashboard-api ../../bin/dashboard-api

      - name: Ensure executables
        run: chmod +x bin/blockdag-node bin/nodeworker bin/fastsnap bin/mining-pool bin/dashboard-api

      - name: Generate checksums
        shell: bash
        run: |
          sha256sum bin/blockdag-node bin/nodeworker bin/fastsnap bin/mining-pool bin/dashboard-api > checksums.txt

      - name: Validate compose (pool Dockerfile)
        shell: bash
        run: |
          set -euo pipefail
          test -f .env.example
          docker compose --env-file .env.example config | grep -q 'dockerfile: dockerfile' || \
            { echo "::error::Compose must resolve dockerfile for pool tarball env"; exit 1; }
          scripts/validate-pi5-restart-hardening.sh .

      - name: Create universal release zip
        id: package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ROOT="${PACKAGE_NAME}-${VERSION}"
          OUT="${ROOT}.zip"
          LATEST_OUT="${PACKAGE_NAME}.zip"
          LATEST_SHA256="${LATEST_OUT}.sha256"


          test -f .env.example || { echo "::error::Missing .env.example"; exit 1; }
          test -f scripts/release/install.sh || { echo "::error::Missing release installer scripts"; exit 1; }

          rm -rf "${ROOT}" "${OUT}" "${LATEST_OUT}" "${LATEST_SHA256}"
          mkdir "${ROOT}"
          cp docker-compose.yml dockerfile .dockerignore .env.example node.conf.example README.md checksums.txt haproxy.cfg "${ROOT}/"
          echo "${VERSION}" > "${ROOT}/version.txt"
          cp scripts/release/install.sh scripts/release/install.ps1 scripts/release/install.cmd "${ROOT}/"
          cp -a scripts/release/installers "${ROOT}/installers"
          cp -a bin sql docker scripts dashboard asic-pool tools "${ROOT}/"
          rsync -a --exclude='runtime/' --exclude='runtime-*/' --exclude='__pycache__/' --exclude='*.pyc' ops "${ROOT}/"
          chmod +x "${ROOT}/install.sh" "${ROOT}/installers/"*.sh

          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi
          zip -qr "${OUT}" "${ROOT}"
          python3 scripts/check-release-archive.py "${OUT}"
          cp "${OUT}" "${LATEST_OUT}"
          sha256sum "${LATEST_OUT}" > "${LATEST_SHA256}"
          rm -rf "${ROOT}"

          touch version.txt
          echo "${VERSION}" > version.txt

          ls -lh "${OUT}"
          SZ="$(stat -c%s "${OUT}")"
          MAX=$((2 * 1024 * 1024 * 1024 - 256 * 1024 * 1024))
          if [ "${SZ}" -gt "${MAX}" ]; then
            echo "::error::Zip ${SZ} bytes exceeds safe GitHub limit (~2GiB cap minus headroom)"
            exit 1
          fi
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"
          echo "latest_artifact=${LATEST_OUT}" >> "$GITHUB_OUTPUT"
          echo "latest_sha256=${LATEST_SHA256}" >> "$GITHUB_OUTPUT"
          echo "version_file=version.txt" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.latest_artifact }}
            ${{ steps.package.outputs.latest_sha256 }}
            ${{ steps.package.outputs.version_file }}
          draft: false
          prerelease: false
