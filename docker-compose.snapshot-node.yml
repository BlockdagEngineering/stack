# Dedicated BlockDAG snapshot node for periodic snap export only.
# Run beside the full mining stack so stopping this container does not affect
# the pool RPC node.
#
# From pool-stack-docker root:
#   cp .env.snapshot.example .env.snapshot
#   cp node.snapshot.conf.example node.snapshot.conf
#   docker compose -p snapshot-node -f docker-compose.snapshot-node.yml --env-file .env.snapshot up -d
#
# Container name is typically: snapshot-node-node-1

x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-docker/no-snapshot.marker}

services:
  node:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9150}:8150"
      - "${BDAG_RPC_PORT:-48131}:38131"
      - "${EVM_HTTP_PORT:-28545}:18545"
      - "${EVM_WS_PORT:-28546}:18546"
      - "${NODE_METRICS_PORT:-16060}:6060"
    environment:
      NODE_ARGS_APPEND: ${SNAPSHOT_NODE_ARGS_APPEND:---fastartifactsync}
      BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT: ${SNAPSHOT_BDAG_NODE_SUBMIT_OBSOLETE_HEIGHT:-20}
      BDAG_NODE_MAX_BAD_RESPONSES: ${SNAPSHOT_BDAG_NODE_MAX_BAD_RESPONSES:-12}
      BDAG_FASTSYNC_SNAPSHOT_PATH: ${SNAPSHOT_BDAG_FASTSYNC_SNAPSHOT_PATH:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_ID:-}
      BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX: ${BDAG_FASTSYNC_ARTIFACT_SIGNING_KEY_HEX:-}
      BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL: ${BDAG_FASTSYNC_ARTIFACT_MANIFEST_TTL:-24h}
      BDAG_FASTSNAP_ENABLED: ${SNAPSHOT_BDAG_FASTSNAP_ENABLED:-1}
      BDAG_FASTSNAP_REQUIRED: ${SNAPSHOT_BDAG_FASTSNAP_REQUIRED:-0}
      BDAG_FASTSNAP_PEERS_FILE: ${SNAPSHOT_BDAG_FASTSNAP_PEERS_FILE:-/etc/bdagStack/node.conf}
      BDAG_FASTSNAP_AUTO_MAX_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_AUTO_MAX_PEERS:-3}
      BDAG_FASTSNAP_LEGACY_FALLBACK: ${SNAPSHOT_BDAG_FASTSNAP_LEGACY_FALLBACK:-0}
      BDAG_FASTSNAP_NETWORK: ${BDAG_FASTSNAP_NETWORK:-mainnet}
      BDAG_FASTSNAP_PEERS: ${SNAPSHOT_BDAG_FASTSNAP_PEERS:-}
      BDAG_FASTSNAP_MIN_TIP: ${SNAPSHOT_BDAG_FASTSNAP_MIN_TIP:-0}
      BDAG_FASTSNAP_TIMEOUT: ${SNAPSHOT_BDAG_FASTSNAP_TIMEOUT:-300s}
      BDAG_FASTSNAP_PARALLELISM: ${SNAPSHOT_BDAG_FASTSNAP_PARALLELISM:-8}
      BDAG_FASTSNAP_RETRIES: ${SNAPSHOT_BDAG_FASTSNAP_RETRIES:-5}
      BDAG_FASTSNAP_RETRY_DELAY: ${SNAPSHOT_BDAG_FASTSNAP_RETRY_DELAY:-10s}
      BDAG_FASTSNAP_TRUSTED_SIGNERS: ${BDAG_FASTSNAP_TRUSTED_SIGNERS:-}
      BDAG_FASTSNAP_ALLOW_UNSIGNED: ${BDAG_FASTSNAP_ALLOW_UNSIGNED:-0}
      BDAG_FASTSNAP_KEEP_ARCHIVE: ${BDAG_FASTSNAP_KEEP_ARCHIVE:-0}
    volumes:
      - snapshot-node-data:/var/lib/bdagStack/node
      - snapshot-nodeworker-data:/var/lib/bdagStack/nodeworker
      - ./node.snapshot.conf:/etc/bdagStack/node.conf:ro

volumes:
  snapshot-node-data:
    name: bdag_snapshot_node_data
  snapshot-nodeworker-data:
    name: bdag_snapshot_nodeworker_data
