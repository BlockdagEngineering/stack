# Dedicated BlockDAG node for periodic snap export only.
# Run beside the full mining stack so stopping this container does not affect pool RPC.
#
# From pool-stack-docker root:
#   cp .env.snapshot.example .env.snapshot
#   cp node.snapshot.conf.example node.snapshot.conf
#   docker compose -p snapshot-node -f docker-compose.snapshot-node.yml --env-file .env.snapshot up -d
#
# Container name is typically: snapshot-node-node-1

x-build-args: &build-args
  SNAPSHOT_PATH: ${SNAPSHOT_PATH:-docker/no-snapshot.marker}

services:
  node:
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-dockerfile}
      target: node
      args:
        <<: *build-args
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9150}:8150"
      - "${BDAG_RPC_PORT:-48131}:38131"
      - "${EVM_HTTP_PORT:-28545}:18545"
      - "${EVM_WS_PORT:-28546}:18546"
      - "${NODE_METRICS_PORT:-16060}:6060"
    volumes:
      - snapshot-node-data:/var/lib/bdagStack/node
      - snapshot-nodeworker-data:/var/lib/bdagStack/nodeworker
      - ./node.snapshot.conf:/etc/bdagStack/node.conf:ro

volumes:
  snapshot-node-data:
    name: bdag_snapshot_node_data
  snapshot-nodeworker-data:
    name: bdag_snapshot_nodeworker_data
